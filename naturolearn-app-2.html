<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="NaturoLearn">
<meta name="theme-color" content="#ffffff">
<title>NaturoLearn</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:-webkit-fill-available}
body{background:#f7f7f3;color:#1a1a1a;font-family:'DM Sans',sans-serif;min-height:100vh;min-height:-webkit-fill-available;-webkit-text-size-adjust:100%;overscroll-behavior:none}
:root{--accent:#2d7a3f;--accent-bg:#e8f5eb;--accent-light:#c8e6c9;--red:#c0392b;--red-bg:#fdecea;--red-light:#f5c0bc;--gold:#92400e;--gold-bg:#fef3e2;--gold-light:#fde68a;--blue:#1a56db;--blue-bg:#e8f0fe;--border:#e8e8e4;--border-light:#f0f0ec;--surface:#fff;--muted:#888;--font-mono:'DM Mono',monospace}

/* ── App shell ── */
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;padding-top:env(safe-area-inset-top);flex-shrink:0}
.header-inner{height:52px;display:flex;align-items:center;gap:12px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.4px;color:#1a1a1a}
.logo em{font-style:normal;color:var(--accent)}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{max-width:580px;margin:0 auto;padding:20px 16px 32px}
.bottom-nav{background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;padding-bottom:env(safe-area-inset-bottom);flex-shrink:0}
.bnav{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px 0;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;color:#aaa;font-size:10px;font-weight:600;gap:3px;letter-spacing:.3px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;position:relative;transition:color .15s;min-height:56px}
.bnav.on{color:#1a1a1a}
.bnav-icon{font-size:21px;line-height:1}
.bnav-dot{position:absolute;top:7px;right:calc(50% - 18px);width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}

/* ── Common ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#bbb;margin-bottom:10px}
.page-title{font-size:21px;font-weight:700;margin-bottom:3px;letter-spacing:-.3px}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.empty-state{text-align:center;padding:52px 20px;color:#ccc}
.empty-state .ei{font-size:44px;margin-bottom:14px}
.empty-state .et{font-size:15px;font-weight:600;color:#aaa;margin-bottom:6px}
.empty-state .es{font-size:13px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;transition:all .12s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.btn-dark{background:#1a1a1a;color:#fff}.btn-dark:active{background:#333}
.btn-green{background:var(--accent);color:#fff}.btn-green:active{opacity:.85}
.btn-outline{background:transparent;color:#1a1a1a;border:1.5px solid var(--border)}.btn-outline:active{background:#f5f5f2}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-ghost:active{color:#1a1a1a}
.btn-danger{background:transparent;color:var(--red);border:1px solid var(--red-light)}.btn-danger:active{background:var(--red-bg)}
.btn:disabled{opacity:.35;pointer-events:none}
.btn-sm{padding:6px 13px;font-size:13px;border-radius:8px}
.btn-lg{padding:14px 24px;font-size:15px;border-radius:12px}
.btn-block{width:100%}
.btn-icon{padding:8px;border-radius:8px}

/* ── Form ── */
input[type=text]{border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:16px;background:var(--surface);color:#1a1a1a;outline:none;transition:border .15s;width:100%}
input[type=text]:focus{border-color:#1a1a1a}

/* ── Progress ── */
.progress{background:#ebebeb;border-radius:99px;height:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* ── Badges & tags ── */
.badge{display:inline-flex;align-items:center;background:var(--accent-bg);color:var(--accent);border-radius:99px;font-size:11px;font-weight:700;padding:2px 9px;font-family:var(--font-mono)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-gray{background:#f0f0ec;color:#888}
.tag{display:inline-block;background:#eef2ff;color:#4338ca;border-radius:6px;font-size:11px;font-weight:500;padding:2px 8px}

/* ── Alerts ── */
.alert{padding:12px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:14px;line-height:1.4}
.alert-green{background:var(--accent-bg);color:var(--accent)}
.alert-orange{background:var(--gold-bg);color:var(--gold)}
.alert-blue{background:var(--blue-bg);color:var(--blue)}
.alert-red{background:var(--red-bg);color:var(--red)}

/* ── Spinner ── */
.spin{width:26px;height:26px;border:2px solid #eee;border-top-color:#1a1a1a;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Modal (bottom sheet) ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);border-radius:22px 22px 0 0;padding:0 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:600px;max-height:88vh;overflow-y:auto;animation:slideUp .25s cubic-bezier(.4,0,.2,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:38px;height:4px;background:#e0e0dc;border-radius:2px;margin:14px auto 20px}
.sheet-title{font-size:18px;font-weight:700;margin-bottom:6px}
.sheet-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.4}
.sheet-footer{display:flex;gap:10px;margin-top:20px}

/* ── Library ── */
.group-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border-light);cursor:pointer;-webkit-tap-highlight-color:transparent}
.group-item:last-child{border-bottom:none}
.group-item:active{background:#fafaf8}
.course-item{padding:16px;border-bottom:1px solid var(--border-light)}
.course-item:last-child{border-bottom:none}
.course-stats{display:flex;gap:10px;flex-wrap:wrap;margin:6px 0 8px}
.stat-pill{font-size:12px;font-family:var(--font-mono);color:#666}
.upload-drop{border:2px dashed #d8d8d4;border-radius:14px;padding:36px 20px;text-align:center;cursor:pointer;background:#fafaf8;-webkit-tap-highlight-color:transparent}
.upload-drop:active{border-color:#aaa}

/* ── Play setup ── */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.mode-card{padding:18px 12px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;-webkit-tap-highlight-color:transparent;transition:all .12s}
.mode-card.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.mode-card-icon{font-size:24px;margin-bottom:6px}
.mode-card-label{font-size:13px;font-weight:700}
.course-check-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f5f5f2;cursor:pointer;-webkit-tap-highlight-color:transparent}
.course-check-item:last-child{border-bottom:none}
.group-header-row{padding:8px 16px;font-size:11px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:1.2px;background:#fafaf8;border-bottom:1px solid var(--border-light)}

/* ── Game ── */
.game-shell{display:flex;flex-direction:column;gap:0}
.game-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.game-score{font-family:var(--font-mono);font-size:13px;color:var(--accent);font-weight:500}
.game-count{font-family:var(--font-mono);font-size:13px;color:#bbb}

/* Flashcard */
.fc-scene{perspective:900px;height:210px;cursor:pointer;margin-bottom:20px;-webkit-tap-highlight-color:transparent}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .42s cubic-bezier(.4,0,.2,1);border-radius:14px}
.fc-inner.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;border:1px solid var(--border)}
.fc-front{background:var(--surface)}
.fc-back{background:#f6fcf7;border-color:var(--accent-light);transform:rotateY(180deg)}
.fc-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#ccc;margin-bottom:12px}
.fc-text{font-size:18px;font-weight:600;line-height:1.45;color:#1a1a1a}
.fc-hint{font-size:12px;color:#ccc;margin-top:14px}
.sm2-row{display:flex;gap:8px;justify-content:center}
.sm2-btn{flex:1;max-width:130px;padding:13px 10px;border-radius:10px;border:1.5px solid;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;-webkit-tap-highlight-color:transparent;transition:opacity .12s}
.sm2-btn:active{opacity:.75}
.sm2-bad{border-color:var(--red-light);color:var(--red);background:var(--red-bg)}
.sm2-mid{border-color:var(--gold-light);color:var(--gold);background:var(--gold-bg)}
.sm2-good{border-color:var(--accent-light);color:var(--accent);background:var(--accent-bg)}

/* QCM */
.qcm-question{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;font-size:16px;font-weight:600;line-height:1.5;margin-bottom:14px}
.qcm-options{display:flex;flex-direction:column;gap:9px}
.qcm-opt{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;text-align:left;color:#1a1a1a;-webkit-tap-highlight-color:transparent;transition:all .12s;width:100%}
.qcm-opt.ok{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.qcm-opt.ko{border-color:var(--red);background:var(--red-bg);color:var(--red)}
.qcm-opt.dim{opacity:.5}
.opt-key{width:26px;height:26px;border-radius:6px;background:#f0f0ec;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--font-mono)}

/* Fill */
.fill-question{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;font-size:16px;font-weight:600;line-height:2.5;margin-bottom:14px}
.fill-blank{background:transparent;border:none;border-bottom:2px solid #1a1a1a;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;padding:2px 4px;width:120px;outline:none;text-align:center;color:#1a1a1a;-webkit-appearance:none}
.fill-blank.ok{border-color:var(--accent);color:var(--accent)}
.fill-blank.ko{border-color:var(--red);color:var(--red)}

/* Match */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.match-col{display:flex;flex-direction:column;gap:8px}
.match-btn{padding:11px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;text-align:center;-webkit-tap-highlight-color:transparent;line-height:1.35;transition:all .12s;color:#1a1a1a}
.match-btn.sel{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.match-btn.done{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.match-btn.err{border-color:var(--red);background:var(--red-bg);animation:shake .28s}
@keyframes shake{0%,100%{transform:translateX(0)}30%{transform:translateX(-5px)}70%{transform:translateX(5px)}}

/* Results */
.results-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:40px 24px;text-align:center}
.results-pct{font-size:64px;font-weight:700;font-family:var(--font-mono);line-height:1;letter-spacing:-2px}
.results-stats{display:flex;justify-content:center;gap:28px;margin:20px 0 24px}
.rstat-v{font-size:26px;font-weight:700;font-family:var(--font-mono)}
.rstat-l{font-size:10px;color:#bbb;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* Stats */
.stats-top{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center}
.stat-card-v{font-size:28px;font-weight:700;font-family:var(--font-mono)}
.stat-card-l{font-size:10px;color:#bbb;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.course-stat-row{padding:14px 16px;border-bottom:1px solid var(--border-light)}
.course-stat-row:last-child{border-bottom:none}

/* Animations */
.fade-in{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
'use strict';

// ── SM-2 ──────────────────────────────────────────────────────────────────────
function sm2(card, q) {
  let {interval:iv=0, repetitions:rp=0, easeFactor:ef=2.5} = card;
  if (q >= 3) { iv = rp===0?1:rp===1?6:Math.round(iv*ef); rp++; }
  else { rp=0; iv=1; }
  ef = Math.max(1.3, ef + .1 - (5-q)*(.08+(5-q)*.02));
  return {interval:iv, repetitions:rp, easeFactor:ef, nextReview:Date.now()+iv*86400000};
}
const isDue = c => !c.nextReview || Date.now() >= c.nextReview;

// ── Storage ───────────────────────────────────────────────────────────────────
function load() {
  try { const r=localStorage.getItem('nl3'); return r?JSON.parse(r):{groups:[],decks:[],cards:[]}; }
  catch { return {groups:[],decks:[],cards:[]}; }
}
function save(d) { try { localStorage.setItem('nl3',JSON.stringify(d)); } catch(e){console.error(e);} }

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  tab:'library', data:load(),
  groupId:null, showNewGroup:false, gName:'',
  mode:'flash', selDecks:new Set(), session:null,
  showImport:false, showExport:null, importTxt:'', importErr:'',
};

function set(patch) { Object.assign(S, typeof patch==='function'?patch(S):patch); R(); }
function persist(d) { S.data=d; save(d); R(); }

// ── Helpers ───────────────────────────────────────────────────────────────────
const h = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

// ── Render ────────────────────────────────────────────────────────────────────
function R() {
  const due = S.data.cards.filter(isDue).length;
  document.getElementById('app').innerHTML = `
    <div id="app-inner">
      <div class="header"><div class="header-inner">
        <div class="logo">Naturo<em>Learn</em></div>
        <div style="margin-left:auto;display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="openImport()">📥 Importer</button>
        </div>
      </div></div>
      <div class="main"><div class="page">
        ${S.tab==='library'?rLibrary():S.tab==='play'?rPlay():rStats()}
      </div></div>
      <nav class="bottom-nav">
        ${[['library','📚','Cours'],['play','▶','Réviser'],['stats','◉','Stats']].map(([id,ic,lb])=>`
          <button class="bnav ${S.tab===id?'on':''}" onclick="setTab('${id}')">
            <span class="bnav-icon">${ic}</span><span>${lb}</span>
            ${id==='play'&&due>0?`<span class="bnav-dot"></span>`:''}
          </button>`).join('')}
      </nav>
      ${S.showNewGroup?rNewGroupSheet():''}
      ${S.showImport?rImportSheet():''}
      ${S.showExport?rExportSheet():''}
    </div>`;
  // bind file input
  const fi=document.getElementById('fi');
  if(fi) fi.onchange=e=>importFile(e.target.files[0]);
}

const setTab = t => set({tab:t,session:null});

// ── Library ───────────────────────────────────────────────────────────────────
function rLibrary() {
  if (!S.groupId) return rGroupList();
  return rGroupDetail();
}

function rGroupList() {
  const {data} = S;
  return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px">
      <div><div class="page-title">Bibliothèque</div>
      <div class="page-sub">${data.groups.length} groupe(s) · ${data.decks.length} cours</div></div>
      <button class="btn btn-dark btn-sm" onclick="set({showNewGroup:true})">+ Groupe</button>
    </div>
    ${data.groups.length===0?`
      <div class="empty-state fade-in">
        <div class="ei">📂</div>
        <div class="et">Aucun groupe</div>
        <div class="es">Créez un groupe (ex: Cycle 1)<br>puis importez vos cours JSON</div>
      </div>
    `:`<div class="card fade-in">${data.groups.map(g=>{
      const gd=data.decks.filter(d=>d.groupId===g.id);
      const gc=data.cards.filter(c=>gd.some(d=>d.id===c.deckId));
      const due=gc.filter(isDue).length;
      return `<div class="group-item" onclick="set({groupId:'${g.id}'})">
        <span style="font-size:22px">📁</span>
        <div style="flex:1">
          <div style="font-weight:700;font-size:15px">${h(g.name)}</div>
          <div style="font-size:12px;color:#999;margin-top:1px">${gd.length} cours · ${gc.length} cartes${due>0?` · <span style="color:var(--red)">${due} à réviser</span>`:''}</div>
        </div>
        ${due>0?`<span class="badge badge-red">${due}</span>`:''}
        <span style="color:#ddd;font-size:18px">›</span>
      </div>`;
    }).join('')}</div>`}`;
}

function rGroupDetail() {
  const {data,groupId} = S;
  const group = data.groups.find(g=>g.id===groupId);
  const decks = data.decks.filter(d=>d.groupId===groupId);
  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <button class="btn btn-ghost btn-sm" onclick="set({groupId:null})">← Retour</button>
      <div style="flex:1"><div class="page-title" style="margin-bottom:0">${h(group?.name)}</div>
      <div style="font-size:12px;color:#aaa">${decks.length} cours</div></div>
    </div>

    ${decks.length===0?`
      <div class="upload-drop fade-in" onclick="openImport()">
        <div style="font-size:34px;margin-bottom:10px">📥</div>
        <div style="font-weight:700;font-size:15px;margin-bottom:6px">Importer un cours JSON</div>
        <div style="font-size:13px;color:#aaa">Générez le JSON dans Claude, importez-le ici</div>
      </div>
    `:`
      <div class="card fade-in">
        ${decks.map(deck=>{
          const dc=data.cards.filter(c=>c.deckId===deck.id);
          const due=dc.filter(isDue).length;
          const mastered=dc.filter(c=>(c.repetitions||0)>=3).length;
          const pct=dc.length>0?Math.round((mastered/dc.length)*100):0;
          return `<div class="course-item">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
              <div style="font-weight:700;font-size:14px;flex:1">${h(deck.name)}</div>
              ${due>0?`<span class="badge badge-red">${due} dues</span>`:''}
              ${mastered===dc.length&&dc.length>0?`<span class="badge">✓ Maîtrisé</span>`:''}
            </div>
            <div class="course-stats">
              <span class="stat-pill">🃏 ${deck.counts?.flash||0}</span>
              <span class="stat-pill">✅ ${deck.counts?.qcm||0}</span>
              <span class="stat-pill">✍ ${deck.counts?.fill||0}</span>
              <span class="stat-pill">🔗 ${deck.counts?.match||0}</span>
              <span class="stat-pill" style="color:#bbb">${mastered}/${dc.length} maîtrisées</span>
            </div>
            <div class="progress" style="margin-bottom:8px"><div class="progress-fill" style="width:${pct}%"></div></div>
            ${deck.themes?`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px">${deck.themes.map(t=>`<span class="tag">${h(t)}</span>`).join('')}</div>`:''}
            <div style="display:flex;gap:8px">
              <button class="btn btn-outline btn-sm" onclick="exportDeck('${deck.id}')">📤 Exporter</button>
              <button class="btn btn-danger btn-sm" onclick="delDeck('${deck.id}')">Supprimer</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="openImport()">+ Importer un autre cours</button></div>
    `}
    <div style="margin-top:24px;padding-top:16px;border-top:1px solid var(--border-light)">

function createGroup() {

function delGroup(gid) {

  const dids=S.data.decks.filter(d=>d.groupId===gid).map(d=>d.id);
  persist({...S.data,groups:S.data.groups.filter(g=>g.id!==gid),decks:S.data.decks.filter(d=>d.groupId!==gid),cards:S.data.cards.filter(c=>!dids.includes(c.deckId))});
  set({groupId:null});
}
function delDeck(did) {
  if(!confirm('Supprimer ce cours ?'))return;
  persist({...S.data,decks:S.data.decks.filter(d=>d.id!==did),cards:S.data.cards.filter(c=>c.deckId!==did)});
}

function importFile(file) {
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{set({importTxt:e.target.result});doImportTxt(e.target.result);};
  r.readAsText(file);
}

function doImport() {
  const txt=(document.getElementById('import-txt')?.value||S.importTxt).trim();
  doImportTxt(txt);
}

function doImportTxt(txt) {
  try {
    const obj=JSON.parse(txt);
    if(!obj.deck||!obj.cards)throw new Error('Format invalide — deck ou cards manquant');
    const gid=document.getElementById('import-group')?.value||S.groupId||S.data.groups[0]?.id;
    if(!gid)throw new Error('Aucun groupe sélectionné');
    const deckId=`d${Date.now()}`;
    const now=Date.now();
    const deck={...obj.deck,id:deckId,groupId:gid,createdAt:now};
    const cards=obj.cards.map((c,i)=>({...c,id:`${deckId}_${i}`,deckId,interval:0,repetitions:0,easeFactor:2.5,nextReview:now}));
    persist({...S.data,decks:[...S.data.decks,deck],cards:[...S.data.cards,...cards]});
    set({showImport:false,importTxt:'',importErr:'',groupId:gid});
  } catch(e) {
    set({importErr:'Erreur : '+(e.message||'JSON invalide')});
  }
}

function exportDeck(did) {
  const deck=S.data.decks.find(d=>d.id===did);
  const cards=S.data.cards.filter(c=>c.deckId===did);
  if(!deck)return;
  const exportObj={deck:{name:deck.name,fileName:deck.fileName,themes:deck.themes,counts:deck.counts,exportedAt:new Date().toISOString()},cards:cards.map(c=>({type:c.type,front:c.front,back:c.back,category:c.category,question:c.question,options:c.options,answer:c.answer,explanation:c.explanation,sentence:c.sentence,answer:c.answer,hint:c.hint,term:c.term,definition:c.definition}))};
  set({showExport:JSON.stringify(exportObj,null,2)});
}

// ── Play ──────────────────────────────────────────────────────────────────────
function rPlay() {
  if(S.data.decks.length===0)return`<div class="empty-state fade-in"><div class="ei">📚</div><div class="et">Aucun cours</div><div class="es">Importez un cours JSON depuis<br>la bibliothèque pour commencer</div></div>`;
  if(S.session)return rGame();
  return rPlaySetup();
}

function rPlaySetup() {
  const {mode,selDecks,data}=S;
  const pool=data.cards.filter(c=>selDecks.has(c.deckId)&&c.type===mode);
  const duePool=pool.filter(isDue);
  return `
    <div class="page-title" style="margin-bottom:3px">Réviser</div>
    <div class="page-sub">Sélectionnez vos cours et un mode</div>

    <div class="section-label">Mode</div>
    <div class="mode-grid">
      ${[['flash','🃏','Flashcards'],['qcm','✅','QCM'],['fill','✍','À trous'],['match','🔗','Association']].map(([id,ic,lb])=>`
        <div class="mode-card ${mode===id?'on':''}" onclick="setMode('${id}')">
          <div class="mode-card-icon">${ic}</div>
          <div class="mode-card-label">${lb}</div>
        </div>`).join('')}
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="section-label" style="margin-bottom:0">Cours</div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="selAll()">Tout</button>
        <button class="btn btn-ghost btn-sm" onclick="selNone()">Aucun</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      ${data.groups.map(g=>{
        const gd=data.decks.filter(d=>d.groupId===g.id);
        if(!gd.length)return'';
        return`<div class="group-header-row">${h(g.name)}</div>
        ${gd.map(deck=>{
          const dc=data.cards.filter(c=>c.deckId===deck.id&&c.type===mode);
          const due=dc.filter(isDue).length;
          return`<label class="course-check-item">
            <input type="checkbox" ${selDecks.has(deck.id)?'checked':''} onchange="toggleDeck('${deck.id}')"
              style="width:18px;height:18px;accent-color:#1a1a1a;flex-shrink:0">
            <div style="flex:1">
              <div style="font-weight:600;font-size:14px">${h(deck.name)}</div>
              <div style="font-size:12px;color:#aaa;margin-top:1px;font-family:var(--font-mono)">${dc.length} cartes</div>
            </div>
            ${due>0?`<span class="badge badge-red">${due}</span>`:dc.length>0?`<span class="badge badge-gray">À jour</span>`:''}
          </label>`;
        }).join('')}`;
      }).join('')}
    </div>

    ${selDecks.size===0
      ?`<div class="alert alert-blue">☝ Cochez au moins un cours</div>`
      :pool.length===0
        ?`<div class="alert alert-orange">Aucune carte "${mode}" dans ces cours</div>`
        :duePool.length>0
          ?`<div class="alert alert-orange">⏰ ${duePool.length} carte(s) à réviser maintenant</div>`
          :`<div class="alert alert-green">✓ À jour — entraînement libre (${pool.length} cartes)</div>`
    }
    <button class="btn btn-dark btn-lg btn-block" onclick="startSession()"
      ${pool.length===0||selDecks.size===0?'disabled':''}>
      ${duePool.length>0?`Réviser les ${duePool.length} dues →`:`S'entraîner (${Math.min(pool.length,25)} cartes) →`}
    </button>`;
}

const setMode = m => set({mode:m});
function toggleDeck(id){const s=new Set(S.selDecks);s.has(id)?s.delete(id):s.add(id);set({selDecks:s});}
const selAll  = () => set({selDecks:new Set(S.data.decks.map(d=>d.id))});
const selNone = () => set({selDecks:new Set()});

function startSession() {
  const {mode,selDecks,data}=S;
  const pool=data.cards.filter(c=>selDecks.has(c.deckId)&&c.type===mode);
  const due=pool.filter(isDue);
  const src=due.length?due:pool;
  const cards=[...src].sort(()=>Math.random()-.5).slice(0,mode==='match'?40:25);
  const matchCards=cards.filter(c=>c.type==='match').slice(0,8);
  set({session:{
    cards, index:0, correct:0, total:cards.length, done:false,
    // flash
    flipped:false,
    // qcm
    sel:null,
    // fill
    fval:'', fchecked:false, fok:false,
    // match
    mterms:[...matchCards].sort(()=>Math.random()-.5),
    mdefs:[...matchCards].sort(()=>Math.random()-.5),
    mmatched:[], mwrong:[], mselT:null, mselD:null,
  }});
}

// ── Game render ───────────────────────────────────────────────────────────────
function rGame() {
  const {session,mode}=S;
  if(session.done)return rResults();
  const card=session.cards[session.index];
  const pct=(session.index/session.total)*100;
  return `<div class="game-shell fade-in">
    <div class="game-bar">
      <button class="btn btn-ghost btn-sm" onclick="set({session:null})">← Quitter</button>
      <div class="progress" style="flex:1"><div class="progress-fill" style="width:${pct}%"></div></div>
      <span class="game-count">${session.index+1}/${session.total}</span>
      <span class="game-score">✓ ${session.correct}</span>
    </div>
    ${mode==='flash'?rFlash(card):''}
    ${mode==='qcm'  ?rQcm(card):''}
    ${mode==='fill' ?rFill(card):''}
    ${mode==='match'?rMatch():''}
  </div>`;
}

// Flash
function rFlash(card) {
  const {flipped}=S.session;
  return `
    <div class="fc-scene" onclick="flipCard()">
      <div class="fc-inner ${flipped?'flip':''}">
        <div class="fc-face fc-front">
          <div class="fc-label">Terme</div>
          <div class="fc-text">${h(card.front)}</div>
          ${!flipped?`<div class="fc-hint">Appuyer pour révéler</div>`:''}
        </div>
        <div class="fc-face fc-back">
          <div class="fc-label">Définition</div>
          <div class="fc-text" style="font-size:15px">${h(card.back)}</div>
        </div>
      </div>
    </div>
    ${flipped?`
      <div class="sm2-row">
        <button class="sm2-btn sm2-bad"  onclick="nxt(false,'${card.id}',0)">😟<br>Oublié</button>
        <button class="sm2-btn sm2-mid"  onclick="nxt(true,'${card.id}',3)">🤔<br>Difficile</button>
        <button class="sm2-btn sm2-good" onclick="nxt(true,'${card.id}',5)">🎯<br>Facile</button>
      </div>
    `:`<div style="text-align:center;color:#ccc;font-size:13px;margin-top:12px">Appuyez sur la carte</div>`}`;
}
const flipCard=()=>set(s=>({session:{...s.session,flipped:!s.session.flipped}}));

// QCM
function rQcm(card) {
  const {sel}=S.session;
  return `
    <div class="qcm-question">${h(card.question)}</div>
    <div class="qcm-options">
      ${(card.options||[]).map((opt,i)=>`
        <button class="qcm-opt ${sel!==null?i===card.answer?'ok':i===sel?'ko':'dim':''}"
          onclick="pickQcm(${i})">
          <span class="opt-key">${'ABCD'[i]}</span>
          ${h(opt.replace(/^[A-D]\.\s*/,''))}
        </button>`).join('')}
    </div>
    ${sel!==null&&card.explanation?`<div class="alert alert-blue" style="margin-top:12px">${h(card.explanation)}</div>`:''}`;
}
function pickQcm(i) {
  if(S.session.sel!==null)return;
  const card=S.session.cards[S.session.index];
  set(s=>({session:{...s.session,sel:i}}));
  setTimeout(()=>nxt(i===card.answer,card.id),1200);
}

// Fill
function rFill(card) {
  const {fval,fchecked,fok}=S.session;
  const parts=(card.sentence||'').split('___BLANK___');
  return `
    <div class="fill-question">
      ${h(parts[0])}
      <input class="fill-blank ${fchecked?fok?'ok':'ko':''}" id="fbi"
        placeholder="Votre réponse…"
        oninput="S.session.fval=this.value"
        onkeyup="S.session.fval=this.value"
        onchange="S.session.fval=this.value"
        onkeydown="if(event.key==='Enter'){S.session.fval=this.value;checkFill();}"
        ${fchecked?'disabled':''} autocorrect="off" autocapitalize="none" spellcheck="false"
        style="width:160px">
      ${h(parts[1]||'')}
    </div>
    ${card.hint&&!fchecked?`<div style="font-size:12px;color:#aaa;margin-bottom:12px">💡 Indice : ${h(card.hint)}</div>`:''}
    ${fchecked
      ?`<div class="alert ${fok?'alert-green':'alert-red'}">${fok?'✓ Correct !' : '✗ Réponse : <strong>'+h(card.answer)+'</strong>'}</div>`
      :`<button class="btn btn-dark" onclick="checkFill()">Vérifier →</button>`
    }`;
}
function checkFill() {
  if(S.session.fchecked) return;
  const input = document.getElementById('fbi');
  const val = (input ? input.value : S.session.fval) || '';
  const card = S.session.cards[S.session.index];
  const ok = val.trim().toLowerCase() === (card.answer||'').trim().toLowerCase();
  S.session.fval = val;
  set(s=>({session:{...s.session,fval:val,fchecked:true,fok:ok}}));
  setTimeout(()=>nxt(ok,card.id),1600);
}

// Match
function rMatch() {
  const {mterms,mdefs,mmatched,mwrong,mselT,mselD}=S.session;
  const done=new Set(mmatched), wrong=new Set(mwrong);
  const cls=(type,idx,id)=>
    `match-btn${done.has(id)?' done':wrong.has(`${type}${idx}`)?' err':(type==='t'&&mselT===idx)||(type==='d'&&mselD===idx)?' sel':''}`;
  return `
    <div class="alert alert-blue" style="margin-bottom:14px">🔗 Relie termes et définitions — ${mmatched.length}/${mterms.length}</div>
    <div class="match-grid">
      <div class="match-col">
        ${mterms.map((t,i)=>`<button class="${cls('t',i,t.id)}" onclick="pickMatch('t',${i})" ${done.has(t.id)?'disabled':''}>${h(t.term)}</button>`).join('')}
      </div>
      <div class="match-col">
        ${mdefs.map((d,i)=>`<button class="${cls('d',i,d.id)}" onclick="pickMatch('d',${i})" ${done.has(d.id)?'disabled':''}>${h(d.definition)}</button>`).join('')}
      </div>
    </div>`;
}
function pickMatch(type,idx) {
  const {mselT,mselD,mterms,mdefs,mmatched,mwrong}=S.session;
  if(mwrong.length)return;
  let nT=mselT,nD=mselD;
  if(type==='t')nT=idx;else nD=idx;
  if(nT!==null&&nD!==null){
    if(mterms[nT].id===mdefs[nD].id){
      const nm=[...mmatched,mterms[nT].id];
      set(s=>({session:{...s.session,mmatched:nm,mselT:null,mselD:null}}));
      if(nm.length===mterms.length)setTimeout(()=>set(s=>({session:{...s.session,done:true,correct:nm.length,total:mterms.length}})),600);
    }else{
      set(s=>({session:{...s.session,mwrong:[`t${nT}`,`d${nD}`],mselT:null,mselD:null}}));
      setTimeout(()=>set(s=>({session:{...s.session,mwrong:[]}})),700);
    }
  }else set(s=>({session:{...s.session,mselT:nT,mselD:nD}}));
}

// Next card
function nxt(correct,cardId,quality) {
  const card=S.data.cards.find(c=>c.id===cardId);
  if(card){
    const upd=sm2(card,quality??(correct?5:0));
    S.data={...S.data,cards:S.data.cards.map(c=>c.id===cardId?{...c,...upd}:c)};
    save(S.data);
  }
  const s=S.session;
  const i=s.index+1,c=correct?s.correct+1:s.correct;
  if(i>=s.total)set({session:{...s,index:i,correct:c,done:true}});
  else set({session:{...s,index:i,correct:c,flipped:false,sel:null,fval:'',fchecked:false,fok:false}});
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function rStats() {
  const {data}=S;
  const total=data.cards.length;
  const due=data.cards.filter(isDue).length;
  const mastered=data.cards.filter(c=>(c.repetitions||0)>=3&&!isDue(c)).length;
  return `

      <div class="stat-card"><div class="stat-card-v" style="color:var(--accent)">${mastered}</div><div class="stat-card-l">Maîtrisées</div></div>
    </div>
    <div class="section-label" style="margin-bottom:10px">Par type</div>
    <div class="card" style="padding:14px 16px;display:flex;gap:18px;flex-wrap:wrap;margin-bottom:22px">
      ${[['flash','🃏','Flash'],['qcm','✅','QCM'],['fill','✍','Trous'],['match','🔗','Assoc.']].map(([t,ic,lb])=>`
        <div style="display:flex;align-items:center;gap:6px">
          <span>${ic}</span>
          <span style="font-family:var(--font-mono);font-weight:700;font-size:15px">${data.cards.filter(c=>c.type===t).length}</span>
          <span style="font-size:12px;color:#aaa">${lb}</span>
        </div>`).join('')}
    </div>
    <div class="section-label" style="margin-bottom:10px">Progression</div>
    ${data.decks.length===0?`<div class="empty-state"><div class="ei">📊</div><div class="es">Aucun cours importé</div></div>`:`
      <div class="card">
        ${data.groups.map(g=>{
          const gd=data.decks.filter(d=>d.groupId===g.id);
          if(!gd.length)return'';
          return`<div class="group-header-row">${h(g.name)}</div>
          ${gd.map(deck=>{
            const dc=data.cards.filter(c=>c.deckId===deck.id);
            const d=dc.filter(isDue).length;
            const m=dc.filter(c=>(c.repetitions||0)>=3&&!isDue(c)).length;
            const ip=dc.filter(c=>(c.repetitions||0)>0&&(c.repetitions||0)<3).length;
            const pct=dc.length>0?Math.round((m/dc.length)*100):0;
            return`<div class="course-stat-row">
              <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
                <div style="font-weight:600;font-size:14px;flex:1">${h(deck.name)}</div>
                ${d>0?`<span class="badge badge-red">${d} dues</span>`:`<span class="badge badge-gray">À jour</span>`}
                <span style="font-family:var(--font-mono);font-size:13px;font-weight:700">${pct}%</span>
              </div>
              <div class="progress" style="margin-bottom:5px"><div class="progress-fill" style="width:${pct}%"></div></div>
              <div style="font-size:12px;color:#bbb">${m}/${dc.length} maîtrisées · ${ip} en cours</div>
            </div>`;
          }).join('')}`;
        }).join('')}
      </div>`}`;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
R();
</script>
</body>
</html>
